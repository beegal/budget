name: Docker Image CI

on:
  push:
    branches:
      - main
      - release
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: beegal/budget

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

      - name: Run Docker MySQL integration tests
        env:
          RUN_DOCKER_INTEGRATION: "1"
        run: python -m unittest tests.integration.test_docker_mysql -v

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push budget
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}"
          file: build/Dockerfile
          push: ${{ github.ref == 'refs/heads/release' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:release-${{ github.run_number }}
