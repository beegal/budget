<section class="auth-panel panel">
  <h1>Créer un compte</h1>
  <p class="muted">Registration rapide: email, mot de passe, et c'est parti.</p>
  <form class="auth-form" data-auth-register>
    <label>Email
      <input type="email" name="email" autocomplete="email" required>
    </label>
    <label>Mot de passe
      <input type="password" name="password" autocomplete="new-password" minlength="8" required>
    </label>
    <div class="form-actions">
      <button type="submit">Créer le compte</button>
      <a class="button ghost" href="/login">Déjà inscrit</a>
    </div>
    <p class="auth-message save-state" data-auth-message></p>
  </form>
</section>
