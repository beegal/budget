<button type="button" class="row-confirm" data-confirm-{{ kind }}{% if not editing %} hidden{% endif %}>V</button>
    <button type="button" class="row-cancel" data-cancel-{{ kind }}{% if not editing %} hidden{% endif %}>X</button>
    <button type="button" class="row-delete" data-delete-{{ kind }}{% if not deleting %} hidden{% endif %}>-</button>
