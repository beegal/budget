<section class="page-title">
  <div>
    <h1>Administration</h1>
  </div>
  <span class="save-state" data-save-state></span>
</section>

<section class="panel admin-panel">
  <h2>Utilisateurs</h2>
  {% if error %}
  <p class="save-error admin-error">{{ error }}</p>
  {% endif %}
  <div class="settings-table-scroll">
    <table class="sheet-table admin-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Dernière connexion</th>
          <th class="num">Comptes</th>
          <th class="num">Transactions</th>
          <th>Actif</th>
          <th>Admin</th>
          <th>Mot de passe</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user["email"] }}</td>
          <td>{{ user["last_login"] or "-" }}</td>
          <td class="num">{{ user["account_count"] }}</td>
          <td class="num">{{ user["transaction_count"] }}</td>
          <td>
            <form method="post" action="/admin/users/active" class="admin-inline-form">
              <input type="hidden" name="user_id" value="{{ user['id'] }}">
              <input type="hidden" name="enabled" value="{{ 0 if user['is_active'] else 1 }}">
              <button type="submit" class="button {{ 'danger' if user['is_active'] else '' }}" {% if user["id"] == current_user_id %}disabled title="Impossible de désactiver ton propre utilisateur"{% endif %}>
                {{ "Désactiver" if user["is_active"] else "Activer" }}
              </button>
            </form>
          </td>
          <td>
            <form method="post" action="/admin/users/admin" class="admin-inline-form">
              <input type="hidden" name="user_id" value="{{ user['id'] }}">
              <input type="hidden" name="enabled" value="{{ 0 if user['is_superuser'] else 1 }}">
              <button type="submit" class="button {{ 'danger' if user['is_superuser'] else 'ghost' }}" {% if user["id"] == current_user_id and user["is_superuser"] %}disabled title="Impossible de retirer ton propre accès admin"{% endif %}>
                {{ "Retirer admin" if user["is_superuser"] else "Rendre admin" }}
              </button>
            </form>
          </td>
          <td>
            <form method="post" action="/admin/users/password" class="admin-password-form">
              <input type="hidden" name="user_id" value="{{ user['id'] }}">
              <input type="password" name="password" placeholder="Nouveau mot de passe" minlength="8" required>
              <button type="submit">Changer</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
      <tfoot>
        <tr data-admin-user-create-row hidden>
          <td><input form="admin-create-user-form" type="email" name="email" placeholder="email@exemple.com" required></td>
          <td>-</td>
          <td class="num">0</td>
          <td class="num">0</td>
          <td class="center-cell"><input form="admin-create-user-form" type="checkbox" name="is_active" value="1" checked></td>
          <td class="center-cell"><input form="admin-create-user-form" type="checkbox" name="is_superuser" value="1"></td>
          <td>
            <form id="admin-create-user-form" method="post" action="/admin/users/create" class="admin-password-form">
              <input type="password" name="password" placeholder="Mot de passe" minlength="8" required>
              <button type="submit" class="row-confirm icon-button" title="Créer" aria-label="Créer">V</button>
              <button type="button" class="row-cancel icon-button" data-admin-user-create-cancel title="Annuler" aria-label="Annuler">X</button>
            </form>
          </td>
        </tr>
        <tr data-admin-user-add-row>
          <td colspan="6"></td>
          <td class="row-actions">
            <button type="button" class="add-row-button" data-admin-user-create-toggle title="Ajouter un utilisateur" aria-label="Ajouter un utilisateur">+</button>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</section>
