<div class="label-picker" data-label-picker>
  <div class="label-picker-row">
    <input value="{{ label }}" data-original="{{ label }}" autocomplete="off" placeholder="Ex: Groceries - Supermarket" {{ attrs | safe }} data-label-input>
    <button class="label-add" type="button" data-create-label hidden>+</button>
  </div>
  <div class="label-suggestions" data-label-suggestions hidden></div>
</div>
