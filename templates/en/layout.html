<!doctype html>
<html lang="{{ html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - Personal Finance</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>window.BUDGET_CONFIG = {{ frontend_config | safe }};</script>
  <script>window.BUDGET_I18N = {{ frontend_i18n | safe }};</script>
  <script defer src="/static/app.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Personal Finance</a>
    {% if authenticated %}
    <nav>
      <a href="/">Periods</a>
      <a href="/parameters">Settings</a>
      <a href="/transactions">Transactions</a>
      <a href="/summary">Summary</a>
      <a href="/profile">Profile</a>
      {% if show_admin %}
      <a href="/admin">Admin</a>
      {% endif %}
      <label class="language-selector" title="Language">
        <span class="language-selector-icon" data-language-selector-icon>{% for language in languages %}{% if language.selected %}{{ language.icon }}{% endif %}{% endfor %}</span>
        <select data-language-selector aria-label="Language">
          {% for language in languages %}
          <option value="{{ language.id }}" data-icon="{{ language.icon }}"{% if language.selected %} selected{% endif %}>{{ language.label }}</option>
          {% endfor %}
        </select>
      </label>
      <form class="logout-form" method="post" action="/logout"><button type="submit" class="link-button">Logout</button></form>
    </nav>
    {% endif %}
    {% if not authenticated %}
    <label class="language-selector" title="Language">
      <span class="language-selector-icon" data-language-selector-icon>{% for language in languages %}{% if language.selected %}{{ language.icon }}{% endif %}{% endfor %}</span>
      <select data-language-selector aria-label="Language">
        {% for language in languages %}
        <option value="{{ language.id }}" data-icon="{{ language.icon }}"{% if language.selected %} selected{% endif %}>{{ language.label }}</option>
        {% endfor %}
      </select>
    </label>
    {% endif %}
  </header>
  <main>{{ body | safe }}</main>
</body>
</html>
