<section class="page-title">
  <div>
    <h1>Administration</h1>
  </div>
  <span class="save-state" data-save-state></span>
</section>

<section class="panel admin-panel">
  <h2>Benutzer</h2>
  {% if error %}
  <p class="save-error admin-error">{{ error }}</p>
  {% endif %}
  <div class="settings-table-scroll">
    <table class="sheet-table admin-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Letzte Anmeldung</th>
          <th class="num">Konten</th>
          <th class="num">Transaktionen</th>
          <th>Aktiv</th>
          <th>Admin</th>
          <th>Passwort</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user["email"] }}</td>
          <td>{{ user["last_login"] or "-" }}</td>
          <td class="num">{{ user["account_count"] }}</td>
          <td class="num">{{ user["transaction_count"] }}</td>
          <td>
            <form method="post" action="/admin/users/active" class="admin-inline-form">
              <input type="hidden" name="user_id" value="{{ user['id'] }}">
              <input type="hidden" name="enabled" value="{{ 0 if user['is_active'] else 1 }}">
              <button type="submit" class="button {{ 'danger' if user['is_active'] else '' }}" {% if user["id"] == current_user_id %}disabled title="Du kannst deinen eigenen Benutzer nicht deaktivieren"{% endif %}>
                {{ "Deaktivieren" if user["is_active"] else "Aktivieren" }}
              </button>
            </form>
          </td>
          <td>
            <form method="post" action="/admin/users/admin" class="admin-inline-form">
              <input type="hidden" name="user_id" value="{{ user['id'] }}">
              <input type="hidden" name="enabled" value="{{ 0 if user['is_superuser'] else 1 }}">
              <button type="submit" class="button {{ 'danger' if user['is_superuser'] else 'ghost' }}" {% if user["id"] == current_user_id and user["is_superuser"] %}disabled title="Du kannst deinen eigenen Admin-Zugriff nicht entfernen"{% endif %}>
                {{ "Admin entfernen" if user["is_superuser"] else "Zum Admin machen" }}
              </button>
            </form>
          </td>
          <td>
            <form method="post" action="/admin/users/password" class="admin-password-form">
              <input type="hidden" name="user_id" value="{{ user['id'] }}">
              <input type="password" name="password" placeholder="Neues Passwort" minlength="8" required>
              <button type="submit">Ändern</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
      <tfoot>
        <tr data-admin-user-create-row hidden>
          <td><input form="admin-create-user-form" type="email" name="email" placeholder="email@exemple.com" required></td>
          <td>-</td>
          <td class="num">0</td>
          <td class="num">0</td>
          <td class="center-cell"><input form="admin-create-user-form" type="checkbox" name="is_active" value="1" checked></td>
          <td class="center-cell"><input form="admin-create-user-form" type="checkbox" name="is_superuser" value="1"></td>
          <td>
            <form id="admin-create-user-form" method="post" action="/admin/users/create" class="admin-password-form">
              <input type="password" name="password" placeholder="Passwort" minlength="8" required>
              <button type="submit" class="row-confirm icon-button" title="Erstellen" aria-label="Erstellen">V</button>
              <button type="button" class="row-cancel icon-button" data-admin-user-create-cancel title="Abbrechen" aria-label="Abbrechen">X</button>
            </form>
          </td>
        </tr>
        <tr data-admin-user-add-row>
          <td colspan="6"></td>
          <td class="row-actions">
            <button type="button" class="add-row-button" data-admin-user-create-toggle title="Benutzer hinzufügen" aria-label="Benutzer hinzufügen">+</button>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</section>
