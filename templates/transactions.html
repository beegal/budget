<section class="page-title"><h1>Transactions</h1></section>
<form class="filters" method="get">
  <select name="period">${period_options}</select>
  <select name="account">${account_options}</select>
  <input name="q" value="${search}" placeholder="Recherche intitulé">
  <button>Filtrer</button>
</form>
<section class="panel">
  <table>
    <thead><tr><th>Date</th><th>Période</th><th>Compte</th><th>Intitulé</th><th class="num">Montant</th></tr></thead>
    <tbody>${row_html}</tbody>
  </table>
</section>
