<section class="page-title">
  <div>
    <p class="eyebrow">${period_label}</p>
    <h1>Import CSV</h1>
  </div>
  <a class="button ghost" href="/period/${period_id}?account=${account_id}">Retour au compte</a>
</section>
<section class="panel narrow">
  <dl class="import-context">
    <div><dt>Compte</dt><dd>${account_name}</dd></div>
    <div><dt>Période</dt><dd>${period_name}</dd></div>
    <div><dt>Dates valides</dt><dd>${period_start_date} &lt;= date${period_end_date_clause}</dd></div>
  </dl>
  <form method="post" action="/period/${period_id}/import" class="import-form">
    <input type="hidden" name="account_id" value="${account_id}">
    <div class="form-row">
      <label>Format de date
        <select name="date_format" data-import-date-format>
          <option value="dmy" ${date_format_dmy_selected}>jj/mm/yy</option>
          <option value="mdy" ${date_format_mdy_selected}>mm/jj/yy</option>
          <option value="ymd" ${date_format_ymd_selected}>yy-mm-jj</option>
        </select>
      </label>
    </div>
    <div class="form-row">
      <label>Format
        <select name="format" data-import-format>
          <option value="csv_header" ${format_csv_header_selected}>CSV avec en-tête</option>
          <option value="csv_no_header" ${format_csv_no_header_selected}>CSV sans en-tête</option>
          <option value="tsv_header" ${format_tsv_header_selected}>TSV avec en-tête</option>
          <option value="tsv_no_header" ${format_tsv_no_header_selected}>TSV sans en-tête</option>
        </select>
      </label>
    </div>
    <label>Données à importer
      <textarea name="csv_import" rows="12" data-import-textarea placeholder="Date,Intitulé,Montant,commentaire&#10;26/03/2026,Course - Exemple,-12.50,Note">${raw_csv}</textarea>
    </label>
    <div class="form-actions">
      <button name="action" value="validate">Validation</button>
      ${import_button}
    </div>
  </form>
  ${validation_html}
</section>
